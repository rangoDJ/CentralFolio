services:
  backend:
    image: ghcr.io/rangodj/centralfolio-backend:latest
    # Alternatively, build locally:
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: centralfolio_backend
    restart: unless-stopped
    environment:
      - DATA_DIR=/user_data
      - NODE_ENV=production
      - MASTER_KEY=${MASTER_KEY}
      - ALLOWED_ORIGINS=https://${PUBLIC_DOMAIN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - centralfolio_data:/user_data

  frontend:
    image: ghcr.io/rangodj/centralfolio-frontend:latest
    # Alternatively, build locally:
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    container_name: centralfolio_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  centralfolio_data:
    driver: local
